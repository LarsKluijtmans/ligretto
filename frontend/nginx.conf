server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the content-hashed build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Same-origin proxy: the SPA calls /api/* on its OWN origin; nginx forwards to the backend container.
  # The whole app lives behind ONE public hostname (no separate api. host, no CORS). web + backend share
  # the compose network, so `ligretto-backend:9000` resolves.
  location /api/ {
    proxy_pass http://ligretto-backend:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback + security headers on the app document (HSTS is set at the Cloudflare TLS edge).
  # index.html is NEVER cached: the browser must revalidate it every load, so a redeploy that points
  # at new hashed assets reaches remote users on their next normal reload (no hard-refresh needed).
  # The hashed /assets/ files stay immutable (above) — content-hashed, so a new build = new URL.
  location / {
    # connect-src MUST list the cross-origin login API (auth.<domain>) or the browser blocks the PKCE
    # fetch and react-auth reports "unable to reach the authentication service". The app's OWN /api calls
    # are same-origin ('self'). If you point the app at a different platform, update this host too.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://auth.aangifteportal.nl; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
