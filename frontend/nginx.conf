server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the content-hashed build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Same-origin proxy: the SPA calls /api/* on its OWN origin; nginx forwards to the backend container.
  # ONE public hostname, no separate api.* host (its DNS was unreliable), no CORS. web + backend share the
  # compose network, so `ligretto-backend:9000` resolves. The extra settings make the /api/v1/events SSE
  # stream flow through nginx: HTTP/1.1 + no Connection close, buffering off, and a long read timeout.
  location /api/ {
    proxy_pass http://ligretto-backend:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  # SPA fallback + security headers on the app document (HSTS is set at the Cloudflare TLS edge).
  # index.html is NEVER cached: the browser must revalidate it every load, so a redeploy that points
  # at new hashed assets reaches remote users on their next normal reload (no hard-refresh needed).
  # The hashed /assets/ files stay immutable (above) — content-hashed, so a new build = new URL.
  location / {
    # connect-src: the app's OWN backend is same-origin now ('self', via the /api proxy above), so only
    # the cross-origin platform login API needs listing — https://auth.aangifteportal.nl (PKCE login);
    # without it react-auth reports "unable to reach the authentication service".
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://auth.aangifteportal.nl; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
