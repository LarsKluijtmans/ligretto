# Ligretto — deploy stack on larskluijtmans.com. SPLIT-ORIGIN: the SPA is served at
# ligretto.larskluijtmans.com and calls its API directly at ligrettoapi.larskluijtmans.com, so the
# backend allows the frontend origin via CORS (see CORS_ORIGINS). Ligretto has its OWN Cloudflare tunnel
# (ligretto-cloudflared, profile "tunnel", TUNNEL_TOKEN in .env), separate from the platform tunnel. It
# still co-locates on the platform Docker network (override) so the backend reaches mysql + login-api by
# internal name. Configure the tunnel's Public Hostnames ONCE in Cloudflare Zero Trust:
#   ligretto.larskluijtmans.com    -> http://ligretto-web:80
#   ligrettoapi.larskluijtmans.com -> http://ligretto-backend:9000
#
# Build the SPA on the host FIRST (the unpublished SDKs resolve from ../auth), then bring it up:
#   cd frontend && npm ci && npm run build && cd ..
#   docker compose --profile tunnel up -d --build
name: ligretto

services:
  ligretto-backend:
    build: ./backend
    image: ligretto-backend
    restart: unless-stopped
    environment:
      APP_NAME: ligretto
      # Platform services. TOKEN_ISSUER stays the PUBLIC login URL (the `iss` the browser token pins);
      # the actual call URLs are overridden to internal names for co-locate (see override).
      LOGIN_API_URL: ${PLATFORM_LOGIN_API_URL:-https://auth.aangifteportal.nl}
      AUTH_API_URL: ${PLATFORM_AUTH_API_URL:-https://auth-api.aangifteportal.nl}
      LOGS_API_URL: ${PLATFORM_LOGS_API_URL:-https://logs-api.aangifteportal.nl}
      TOKEN_ISSUER: ${PLATFORM_LOGIN_API_URL:-https://auth.aangifteportal.nl}
      M2M_CLIENT_ID: ${M2M_CLIENT_ID:-}
      M2M_CLIENT_SECRET: ${M2M_CLIENT_SECRET:-}
      LOG_CATEGORY: ligretto
      # Split-origin in prod: the SPA at ligretto.larskluijtmans.com calls this backend cross-origin at
      # ligrettoapi.larskluijtmans.com, so the frontend origin MUST be allowed. Local origins let the dev
      # frontend (:5173) and the local prod build (:9230) call the backend too.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ligretto.larskluijtmans.com,http://localhost:5173,http://127.0.0.1:5173,http://localhost:9230,http://127.0.0.1:9230}
      # App DB on the platform's MySQL. Co-locate reaches it as mysql:3306 (the ligretto DB + user
      # already exist). e.g. mysql+pymysql://ligretto:<pw>@mysql:3306/ligretto
      DATABASE_URL: ${DATABASE_URL:-}
    ports:
      - "9220:9000"   # local debug only; web + tunnel reach ligretto-backend:9000 internally

  ligretto-web:
    build: ./frontend
    image: ligretto-web
    restart: unless-stopped
    depends_on:
      - ligretto-backend
    ports:
      - "9230:80"     # local debug only; the tunnel maps ligretto.larskluijtmans.com -> ligretto-web:80

  # --- Public exposure on larskluijtmans.com (opt-in: --profile tunnel) --------------------------
  # Ligretto's OWN Cloudflare tunnel connector (separate from the platform's). It shares this stack's
  # default network, so it reaches the app by compose name — target ligretto-web:80 / ligretto-backend:9000
  # in the tunnel's Public Hostnames (Cloudflare Zero Trust). TUNNEL_TOKEN lives in .env (gitignored).
  ligretto-cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    depends_on:
      - ligretto-web
      - ligretto-backend
